# ─────────────────────────────────────────────────────────────────────────
#  IndiaMart Automation – Configuration File
#  All test inputs live here. Nothing is hardcoded in the test classes.
# ─────────────────────────────────────────────────────────────────────────

# Base URL
baseUrl=https://www.indiamart.com/

# ── Multi-browser support ──────────────────────────────────────────────────
# Supported values: chrome | firefox
# Selenium 4 auto-manages ChromeDriver. For Firefox, geckodriver must be in PATH.
browser=chrome

# ── TC01 – Car Wash Search ─────────────────────────────────────────────────
city=Chennai
searchKeyword=car wash services

# ── TC03 – Invalid sign-in (must NOT start with 6-9 to be treated as invalid)
invalidPhoneNumber=5476543218
